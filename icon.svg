<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Árbol / pino estilizado — capas de copas -->
  <polygon points="256,60  364,230 148,230" fill="#10b981"/>
  <polygon points="256,130 380,300 132,300" fill="#059669"/>
  <polygon points="256,205 396,376 116,376" fill="#047857"/>

  <!-- Tronco -->
  <rect x="224" y="376" width="64" height="76" rx="8" fill="#065f46"/>

  <!-- Estrella / destello en la cima del árbol -->
  <circle cx="256" cy="52" r="18" fill="#a7f3d0" opacity="0.9"/>
  <polygon points="256,36 260,48 273,48 263,56 267,68 256,60 245,68 249,56 239,48 252,48"
           fill="#064e3b" opacity="0.6"/>

  <!-- Texto "PNLQ" -->
  <text x="256" y="490"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="58"
        font-weight="900"
        letter-spacing="6"
        fill="#6ee7b7">PNLQ</text>

  <!-- Línea decorativa bajo el árbol -->
  <rect x="116" y="454" width="280" height="5" rx="2.5" fill="#059669" opacity="0.45"/>
</svg>
