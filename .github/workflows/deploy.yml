name: Compilar y desplegar en GitHub Pages

on:
  # Trigger directo en push a main — el trigger workflow_run dejó de
  # disparar (GitHub deshabilita workflows con inactividad y, en algunos
  # casos, no encadena correctamente con CI). Confiamos en que CI
  # bloquea los merges con tests rotos.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar
        env:
          # SHA real del commit para version.json (anti-cache de Fase 1).
          GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Desplegar en rama gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
