name: Compilar y desplegar en GitHub Pages

on:
  # Se dispara solo cuando CI termina exitoso sobre main, evitando
  # desplegar versiones con tests rotos.
  workflow_run:
    workflows: ["CI · tests + build"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Solo desplegar si el workflow de CI terminó exitoso.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar
        env:
          # SHA real del commit para version.json (anti-cache de Fase 1).
          GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Desplegar en rama gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
